# EKF publisher configuration
#
# Topic conventions:
#   /robot/datalogger_* = [abs_speed, pos_x, pos_y, pos_z, acc_x, acc_y, acc_z, roll_rate, pitch_rate, yaw_rate]
#   /robot/mcu_*        = [steering_angle, rpm_fl, rpm_fr, rpm_rl, rpm_rr]
#
# Units:
#   speed            -> m/s
#   position         -> m
#   acceleration     -> m/s^2
#   angular rates    -> rad/s
#   steering_angle   -> rad
#   wheel speeds     -> rpm
#
# Sign conventions:
#   pos_x           -> positive forward from spawn direction
#   pos_z           -> positive upward
#   yaw_rate        -> positive for left turn
#   steering_angle  -> positive for left steer
#   wheel rpm       -> positive for forward rotation
#
# Timing:
#   publish_rate_hz            -> overall topic publish rate
#   gps_update_every_n_ticks   -> GPS refresh divider inside the datalogger stream
#                                 Example: 50 Hz publisher + 5 ticks -> 10 Hz GPS refresh
#
# Noise model:
#   GPS fields use additive white noise
#   IMU fields use additive white noise, with persistent bias + random walk for acc_x, acc_y, yaw_rate
#   Steering uses additive bias + white noise
#   RPM uses multiplicative scale error + additive white noise

ekf_publisher:
  ros__parameters:
    publish_rate_hz: 50.0
    gps_update_every_n_ticks: 5
    enable_noise: true

    # Sign convention mapping
    steering_sign: 1.0
    yaw_rate_sign: 1.0
    rpm_fl_sign: 1.0
    rpm_fr_sign: 1.0
    rpm_rl_sign: 1.0
    rpm_rr_sign: 1.0

    # GPS measurement noise
    gps_speed_noise_std: 0.05
    gps_pos_x_noise_std: 0.20
    gps_pos_y_noise_std: 0.20
    gps_pos_z_noise_std: 0.10

    # IMU initial biases
    acc_x_bias_initial: 0.0
    acc_y_bias_initial: 0.0
    gyro_z_bias_initial: 0.0

    # IMU white noise
    acc_x_noise_std: 0.15
    acc_y_noise_std: 0.15
    acc_z_noise_std: 0.15
    roll_rate_noise_std: 0.01
    pitch_rate_noise_std: 0.01
    gyro_z_noise_std: 0.01

    # IMU bias random walk
    acc_x_bias_rw_std: 0.001
    acc_y_bias_rw_std: 0.001
    gyro_z_bias_rw_std: 0.0005

    # MCU sensor model
    steering_bias: 0.0
    steering_noise_std: 0.005
    wheel_speed_scale: 0.0
    rpm_fl_noise_std: 3.0
    rpm_fr_noise_std: 3.0
    rpm_rl_noise_std: 3.0
    rpm_rr_noise_std: 3.0